app-id: com.seyfullahozdaglar.EyeGuard

runtime: org.kde.Platform
runtime-version: '6.8'

sdk: org.kde.Sdk

command: eyeguard

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: python-dependencies
    buildsystem: simple

    build-commands:
      - pip3 install --prefix=/app PyQt6

    build-options:
      build-args:
        - --share=network

  - name: eyeguard
    buildsystem: simple

    build-commands:
      - install -Dm755 eyeguard.py /app/bin/eyeguard
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.seyfullahozdaglar.EyeGuard.png
      - install -Dm644 com.seyfullahozdaglar.EyeGuard.desktop /app/share/applications/com.seyfullahozdaglar.EyeGuard.desktop

    sources:
      - type: dir
        path: ..